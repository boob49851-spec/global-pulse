<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#02040a" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="format-detection" content="telephone=no" />
<meta name="format-detection" content="email=no" />
<title>مرصد اخباري شامل — منصة المراقبة الإخبارية</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles-v2.css" />
<link rel="icon" type="image/svg+xml" href="logo.svg" />
<link rel="manifest" href="/manifest.json" />
</head>
<body>
<div class="boot">
  <div class="boot-logo"><img src="./logo.svg" class="boot-bird" /></div>
  <div class="boot-brand">مرصد اخباري شامل</div>
  <div class="boot-progress"><div class="boot-progress-bar"></div></div>
  <div class="boot-log">› جاري التشغيل</div>
</div>
<div id="app-container" class="app-container mobile-hidden">
  <div id="globe-container"><div id="globe"></div></div>
  <div class="app-header">
    <div class="header-top">
      <div class="logo">🌍 Global Pulse</div>
      <div class="header-time" id="mobile-clock">00:00</div>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="nav-btn active" data-view="feed">📡<span>الأخبار</span></button>
    <button class="nav-btn" data-view="map">🗺️<span>الخريطة</span></button>
    <button class="nav-btn" data-view="stats">📊<span>الإحصائيات</span></button>
  </div>
  <div class="mobile-panel" id="mobile-panel">
    <div class="panel-header">
      <div class="panel-handle"></div>
      <div class="panel-title">الأخبار المباشرة</div>
    </div>
    <div class="panel-content">
      <div class="feed-controls">
        <input type="text" id="mobile-search" placeholder="بحث..." class="mobile-search" />
      </div>
      <div class="feed-filters-mobile">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="conflict">صراع</button>
        <button class="filter-btn" data-filter="political">سياسة</button>
        <button class="filter-btn" data-filter="economic">اقتصاد</button>
      </div>
      <div class="mobile-feed-scroll"></div>
    </div>
  </div>
</div>
<script src="https://unpkg.com/globe.gl"></script>
<script src="data.js"></script>
<script src="app-v2.js"></script>
<audio id="alert-critical" src="alert-critical.mp3" preload="auto"></audio>
<audio id="alert-high" src="alert-high.mp3" preload="auto"></audio>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
    .then(reg=>console.log('[SW] مسجل:',reg.scope))
    .catch(err=>console.log('[SW] فشل:',err));
  });
}
</script>
</body>
</html>
